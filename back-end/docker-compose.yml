version: '3.9'

services:
  api:
    build: ./backend
    container_name: support-panel-api
    ports:
      - '3000:3000'
    volumes:
      # Persiste o banco SQLite fora do container
      - ./backend/data:/app/data
    environment:
      - PORT=3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000
    container_name: support-panel-frontend
    ports:
      - '5173:80'
    depends_on:
      - api
    restart: unless-stopped
